name: Gate 1 game smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  game-smoke:
    name: Simulation, replay, fixtures, boundary, web, docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Rust WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: race_to_n quick simulation
        run: cargo run -p simulate -- --game race_to_n --games 1000

      - name: three_marks quick simulation
        run: cargo run -p simulate -- --game three_marks --games 1000

      - name: column_four quick simulation
        run: cargo run -p simulate -- --game column_four --games 1000

      - name: directional_flip quick simulation
        run: cargo run -p simulate -- --game directional_flip --games 1000

      - name: draughts_lite quick simulation
        run: cargo run -p simulate -- --game draughts_lite --games 1000

      - name: high_card_duel quick simulation
        run: cargo run -p simulate -- --game high_card_duel --games 1000

      - name: masked_claims quick simulation
        run: cargo run -p simulate -- --game masked_claims --games 1000 --action-cap 24

      - name: flood_watch quick simulation
        run: cargo run -p simulate -- --game flood_watch --games 1000

      - name: frontier_control quick simulation
        run: cargo run -p simulate -- --game frontier_control --games 1000

      - name: token_bazaar quick simulation
        run: cargo run -p simulate -- --game token_bazaar --games 1000

      - name: secret_draft quick simulation
        run: cargo run -p simulate -- --game secret_draft --games 1000

      - name: poker_lite quick simulation
        run: cargo run -p simulate -- --game poker_lite --games 1000 --action-cap 16

      - name: plain_tricks quick simulation
        run: cargo run -p simulate -- --game plain_tricks --games 1000 --action-cap 32

      - name: Replay drift check
        run: cargo run -p replay-check -- --game race_to_n --all

      - name: Three Marks replay drift check
        run: cargo run -p replay-check -- --game three_marks --all

      - name: Column Four replay drift check
        run: cargo run -p replay-check -- --game column_four --all

      - name: Directional Flip replay drift check
        run: cargo run -p replay-check -- --game directional_flip --all

      - name: Draughts Lite replay drift check
        run: cargo run -p replay-check -- --game draughts_lite --all

      - name: High Card Duel replay drift check
        run: cargo run -p replay-check -- --game high_card_duel --all

      - name: Masked Claims replay drift check
        run: cargo run -p replay-check -- --game masked_claims --all

      - name: Flood Watch replay drift check
        run: cargo run -p replay-check -- --game flood_watch --all

      - name: Frontier Control replay drift check
        run: cargo run -p replay-check -- --game frontier_control --all

      - name: Token Bazaar replay drift check
        run: cargo run -p replay-check -- --game token_bazaar --all

      - name: Secret Draft replay drift check
        run: cargo run -p replay-check -- --game secret_draft --all

      - name: Poker Lite replay drift check
        run: cargo run -p replay-check -- --game poker_lite --all

      - name: Plain Tricks replay drift check
        run: cargo run -p replay-check -- --game plain_tricks --all

      - name: Fixture validation
        run: cargo run -p fixture-check -- --game race_to_n

      - name: Three Marks fixture validation
        run: cargo run -p fixture-check -- --game three_marks

      - name: Column Four fixture validation
        run: cargo run -p fixture-check -- --game column_four

      - name: Directional Flip fixture validation
        run: cargo run -p fixture-check -- --game directional_flip

      - name: Draughts Lite fixture validation
        run: cargo run -p fixture-check -- --game draughts_lite

      - name: High Card Duel fixture validation
        run: cargo run -p fixture-check -- --game high_card_duel

      - name: Masked Claims fixture validation
        run: cargo run -p fixture-check -- --game masked_claims

      - name: Flood Watch fixture validation
        run: cargo run -p fixture-check -- --game flood_watch

      - name: Frontier Control fixture validation
        run: cargo run -p fixture-check -- --game frontier_control

      - name: Token Bazaar fixture validation
        run: cargo run -p fixture-check -- --game token_bazaar

      - name: Secret Draft fixture validation
        run: cargo run -p fixture-check -- --game secret_draft

      - name: Poker Lite fixture validation
        run: cargo run -p fixture-check -- --game poker_lite

      - name: Plain Tricks fixture validation
        run: cargo run -p fixture-check -- --game plain_tricks

      - name: Rule coverage drift check
        run: cargo run -p rule-coverage -- --game race_to_n

      - name: Three Marks rule coverage drift check
        run: cargo run -p rule-coverage -- --game three_marks

      - name: Column Four rule coverage drift check
        run: cargo run -p rule-coverage -- --game column_four

      - name: Directional Flip rule coverage drift check
        run: cargo run -p rule-coverage -- --game directional_flip

      - name: Draughts Lite rule coverage drift check
        run: cargo run -p rule-coverage -- --game draughts_lite

      - name: High Card Duel rule coverage drift check
        run: cargo run -p rule-coverage -- --game high_card_duel

      - name: Masked Claims rule coverage drift check
        run: cargo run -p rule-coverage -- --game masked_claims

      - name: Flood Watch rule coverage drift check
        run: cargo run -p rule-coverage -- --game flood_watch

      - name: Frontier Control rule coverage drift check
        run: cargo run -p rule-coverage -- --game frontier_control

      - name: Token Bazaar rule coverage drift check
        run: cargo run -p rule-coverage -- --game token_bazaar

      - name: Secret Draft rule coverage drift check
        run: cargo run -p rule-coverage -- --game secret_draft

      - name: Poker Lite rule coverage drift check
        run: cargo run -p rule-coverage -- --game poker_lite

      - name: Plain Tricks rule coverage drift check
        run: cargo run -p rule-coverage -- --game plain_tricks

      - name: Engine boundary
        run: bash scripts/boundary-check.sh

      - name: Build web artifacts
        run: npm --prefix apps/web run build

      - name: WASM smoke
        run: node apps/web/scripts/smoke-load-wasm.mjs

      - name: race_to_n UI smoke
        run: node apps/web/scripts/smoke-ui.mjs

      - name: Static preview smoke
        run: node apps/web/scripts/smoke-preview.mjs

      - name: Browser shell + a11y/no-leak E2E including column_four, directional_flip, draughts_lite, high_card_duel, token_bazaar, secret_draft, poker_lite, plain_tricks, and masked_claims
        run: |
          node apps/web/e2e/shell.smoke.mjs
          node apps/web/e2e/a11y-noleak.smoke.mjs
          node apps/web/e2e/three-marks.smoke.mjs
          node apps/web/e2e/column-four.smoke.mjs
          node apps/web/e2e/directional-flip.smoke.mjs
          node apps/web/e2e/draughts-lite.smoke.mjs
          node apps/web/e2e/high-card-duel.smoke.mjs
          node apps/web/e2e/token-bazaar.smoke.mjs
          node apps/web/e2e/secret-draft.smoke.mjs
          node apps/web/e2e/poker-lite.smoke.mjs
          node apps/web/e2e/plain-tricks.smoke.mjs
          node apps/web/e2e/masked-claims.smoke.mjs

      - name: Docs link check
        run: node scripts/check-doc-links.mjs

      - name: Catalog/docs drift check
        run: node scripts/check-catalog-docs.mjs

      - name: Player rules docs drift check
        run: |
          node scripts/copy-player-rules.mjs
          node scripts/check-player-rules.mjs

      - name: Outcome explanation coverage check
        run: node scripts/check-outcome-explanations.mjs
