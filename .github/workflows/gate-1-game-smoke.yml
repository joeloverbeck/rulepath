name: Gate 1 game smoke

# Build-once + per-game matrix (see docs/plans/2026-06-14-gate-1-ci-split-design.md):
# - `build` compiles the four check tools and the web app once and uploads them
#   as artifacts.
# - `game` fans out one parallel lane per game (driven by ci/games.json) for the
#   simulation / replay / fixture / coverage / per-game e2e checks, so wall-clock
#   stays flat as games are added instead of growing serially.
# - `repo-checks` runs the game-independent checks (boundary, docs, cross-cutting
#   smokes and e2e) exactly once.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build tools + web (once)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate ci/games.json and emit matrix
        id: matrix
        run: node scripts/check-ci-games.mjs --emit

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Rust WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build check tools
        run: cargo build -p simulate -p replay-check -p fixture-check -p rule-coverage

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Build web artifacts
        run: npm --prefix apps/web run build

      - name: Upload tool binaries
        uses: actions/upload-artifact@v5
        with:
          name: tool-binaries
          path: |
            target/debug/simulate
            target/debug/replay-check
            target/debug/fixture-check
            target/debug/rule-coverage
          if-no-files-found: error
          retention-days: 1

      - name: Upload web build
        uses: actions/upload-artifact@v5
        with:
          name: web-build
          path: |
            apps/web/dist
            apps/web/public/wasm_api.wasm
          if-no-files-found: error
          retention-days: 1

  game:
    name: ${{ matrix.id }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.build.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download tool binaries
        uses: actions/download-artifact@v5
        with:
          name: tool-binaries
          path: ci-bin

      - name: Make tools executable
        run: chmod +x ci-bin/*

      - name: Quick simulation
        run: ./ci-bin/simulate --game ${{ matrix.id }} --games 1000 ${{ matrix.sim_flags }}

      - name: Replay drift check
        run: ./ci-bin/replay-check --game ${{ matrix.id }} --all

      - name: Fixture validation
        run: ./ci-bin/fixture-check --game ${{ matrix.id }}

      - name: Rule coverage drift check
        run: ./ci-bin/rule-coverage --game ${{ matrix.id }}

      - name: Set up Node
        if: matrix.e2e != ''
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Cache Puppeteer browser
        if: matrix.e2e != ''
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install web dependencies
        if: matrix.e2e != ''
        run: npm --prefix apps/web ci

      - name: Download web build
        if: matrix.e2e != ''
        uses: actions/download-artifact@v5
        with:
          name: web-build
          path: apps/web

      - name: Browser e2e (a11y / no-leak)
        if: matrix.e2e != ''
        run: node apps/web/e2e/${{ matrix.e2e }}

  repo-checks:
    name: Boundary, docs, cross-cutting smokes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Cache Puppeteer browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Download web build
        uses: actions/download-artifact@v5
        with:
          name: web-build
          path: apps/web

      - name: Engine boundary
        run: bash scripts/boundary-check.sh

      - name: WASM smoke
        run: node apps/web/scripts/smoke-load-wasm.mjs

      - name: race_to_n UI smoke
        run: node apps/web/scripts/smoke-ui.mjs

      - name: Static preview smoke
        run: node apps/web/scripts/smoke-preview.mjs

      - name: Cross-cutting browser e2e (shell, seat labels, a11y/no-leak, rules, outcome, animation)
        run: |
          node apps/web/e2e/shell.smoke.mjs
          node apps/web/e2e/seat-label-consistency.smoke.mjs
          node apps/web/e2e/a11y-noleak.smoke.mjs
          node apps/web/e2e/rules-display.smoke.mjs
          node apps/web/e2e/outcome-explanation.smoke.mjs
          node apps/web/e2e/animation.smoke.mjs

      - name: Docs link check
        run: node scripts/check-doc-links.mjs

      - name: Catalog/docs drift check
        run: node scripts/check-catalog-docs.mjs

      - name: Presentation copy check
        run: node scripts/check-presentation-copy.mjs

      - name: Player rules docs drift check
        run: |
          node scripts/copy-player-rules.mjs
          node scripts/check-player-rules.mjs

      - name: Outcome explanation coverage check
        run: node scripts/check-outcome-explanations.mjs
