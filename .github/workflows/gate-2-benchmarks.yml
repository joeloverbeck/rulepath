name: Gate 2 benchmarks

# Benchmark lanes (see docs/adr/0002-ci-benchmark-gating-lanes.md):
# - pull_request runs a non-gating bench smoke (compile + run, no thresholds)
#   plus schema-only report validation, because shared GitHub runners are not a
#   valid throughput-gating environment.
# - schedule / workflow_dispatch / push-to-main run the hard-failing threshold
#   gate via bench-report against each game threshold file.
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  bench-smoke:
    name: Bench smoke (non-gating)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: race_to_n bench smoke
        run: |
          set -euo pipefail
          cargo bench -p race_to_n -- legal_actions | tee /tmp/race_to_n-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/race_to_n-bench-smoke.txt

      - name: three_marks bench smoke
        run: |
          set -euo pipefail
          cargo bench -p three_marks -- legal_actions | tee /tmp/three_marks-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/three_marks-bench-smoke.txt

      - name: column_four bench smoke
        run: |
          set -euo pipefail
          cargo bench -p column_four -- legal_actions | tee /tmp/column_four-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/column_four-bench-smoke.txt

      - name: directional_flip bench smoke
        run: |
          set -euo pipefail
          cargo bench -p directional_flip -- legal_actions | tee /tmp/directional_flip-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/directional_flip-bench-smoke.txt

      - name: draughts_lite bench smoke
        run: |
          set -euo pipefail
          cargo bench -p draughts_lite -- legal_actions | tee /tmp/draughts_lite-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/draughts_lite-bench-smoke.txt

      - name: high_card_duel bench smoke
        run: |
          set -euo pipefail
          cargo bench -p high_card_duel -- legal_actions | tee /tmp/high_card_duel-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/high_card_duel-bench-smoke.txt

      - name: masked_claims bench smoke
        run: |
          set -euo pipefail
          cargo bench -p masked_claims -- legal_actions | tee /tmp/masked_claims-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/masked_claims-bench-smoke.txt

      - name: flood_watch bench smoke
        run: |
          set -euo pipefail
          cargo bench -p flood_watch -- legal_actions | tee /tmp/flood_watch-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/flood_watch-bench-smoke.txt

      - name: frontier_control bench smoke
        run: |
          set -euo pipefail
          cargo bench -p frontier_control -- legal_actions | tee /tmp/frontier_control-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/frontier_control-bench-smoke.txt

      - name: event_frontier bench smoke
        run: |
          set -euo pipefail
          cargo bench -p event_frontier -- legal_tree | tee /tmp/event_frontier-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/event_frontier-bench-smoke.txt

      - name: token_bazaar bench smoke
        run: |
          set -euo pipefail
          cargo bench -p token_bazaar -- legal_actions | tee /tmp/token_bazaar-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/token_bazaar-bench-smoke.txt

      - name: secret_draft bench smoke
        run: |
          set -euo pipefail
          cargo bench -p secret_draft -- legal_actions | tee /tmp/secret_draft-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/secret_draft-bench-smoke.txt

      - name: poker_lite bench smoke
        run: |
          set -euo pipefail
          cargo bench -p poker_lite -- legal_actions | tee /tmp/poker_lite-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/poker_lite-bench-smoke.txt

      - name: plain_tricks bench smoke
        run: |
          set -euo pipefail
          cargo bench -p plain_tricks -- legal_actions | tee /tmp/plain_tricks-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/plain_tricks-bench-smoke.txt

      - name: briar_circuit bench smoke
        run: |
          set -euo pipefail
          cargo bench -p briar_circuit -- legal_actions | tee /tmp/briar_circuit-bench-smoke.txt
          cargo run -p bench-report -- --schema-only --input /tmp/briar_circuit-bench-smoke.txt

  bench-gate:
    name: Benchmark threshold gate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run benchmarks and enforce thresholds
        run: |
          set -euo pipefail
          failed=0

          cargo bench -p race_to_n | tee /tmp/race_to_n-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/race_to_n-benchmark-report.txt --thresholds games/race_to_n/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p three_marks | tee /tmp/three_marks-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/three_marks-benchmark-report.txt --thresholds games/three_marks/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p column_four | tee /tmp/column_four-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/column_four-benchmark-report.txt --thresholds games/column_four/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p directional_flip | tee /tmp/directional_flip-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/directional_flip-benchmark-report.txt --thresholds games/directional_flip/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p draughts_lite | tee /tmp/draughts_lite-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/draughts_lite-benchmark-report.txt --thresholds games/draughts_lite/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p high_card_duel | tee /tmp/high_card_duel-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/high_card_duel-benchmark-report.txt --thresholds games/high_card_duel/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p masked_claims | tee /tmp/masked_claims-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/masked_claims-benchmark-report.txt --thresholds games/masked_claims/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p flood_watch | tee /tmp/flood_watch-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/flood_watch-benchmark-report.txt --thresholds games/flood_watch/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p frontier_control | tee /tmp/frontier_control-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/frontier_control-benchmark-report.txt --thresholds games/frontier_control/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p event_frontier | tee /tmp/event_frontier-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/event_frontier-benchmark-report.txt --thresholds games/event_frontier/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p token_bazaar | tee /tmp/token_bazaar-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/token_bazaar-benchmark-report.txt --thresholds games/token_bazaar/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p secret_draft | tee /tmp/secret_draft-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/secret_draft-benchmark-report.txt --thresholds games/secret_draft/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p poker_lite | tee /tmp/poker_lite-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/poker_lite-benchmark-report.txt --thresholds games/poker_lite/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p plain_tricks | tee /tmp/plain_tricks-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/plain_tricks-benchmark-report.txt --thresholds games/plain_tricks/benches/thresholds.json; then
            failed=1
          fi

          cargo bench -p briar_circuit | tee /tmp/briar_circuit-benchmark-report.txt
          if ! cargo run -p bench-report -- --input /tmp/briar_circuit-benchmark-report.txt --thresholds games/briar_circuit/benches/thresholds.json; then
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "One or more benchmark threshold checks failed."
            exit 1
          fi
